<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urna Eletrônica - Copa 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="urna">
    <div class="tela">
      <div class="titulo-tela">FAVORITA DA COPA 2026 🏆</div>
      
      <div class="conteudo" id="conteudo">
        <div class="esquerda">
          <div class="cargo">SELEÇÃO CAMPEÃ</div>
          <div class="numeros">
            <div class="numero" id="n1"></div>
            <div class="numero" id="n2"></div>
          </div>
          <div class="info">
            <p><strong>País:</strong> <span id="nome"></span></p>
            <p><strong>Continente:</strong> <span id="time"></span></p>
            <p><strong>Mundiais:</strong> <span id="posicao"></span></p>
          </div>
          <div class="mensagem" id="mensagem"></div>
        </div>
        
        <div class="direita">
          <img id="foto" src="" alt="Bandeira da Seleção">
        </div>
      </div>

      <div class="instrucoes">
        APERTE A TECLA:<br>
        CONFIRMA PARA CONFIRMAR ESTE VOTO<br>
        CORRIGE PARA REINICIAR ESTE VOTO
      </div>
    </div>

    <div class="teclado">
      <div class="teclado-linha">
        <button class="teclado-botao" onclick="clicou(1)">1</button>
        <button class="teclado-botao" onclick="clicou(2)">2</button>
        <button class="teclado-botao" onclick="clicou(3)">3</button>
      </div>
      <div class="teclado-linha">
        <button class="teclado-botao" onclick="clicou(4)">4</button>
        <button class="teclado-botao" onclick="clicou(5)">5</button>
        <button class="teclado-botao" onclick="clicou(6)">6</button>
      </div>
      <div class="teclado-linha">
        <button class="teclado-botao" onclick="clicou(7)">7</button>
        <button class="teclado-botao" onclick="clicou(8)">8</button>
        <button class="teclado-botao" onclick="clicou(9)">9</button>
      </div>
      <div class="teclado-linha">
        <button class="teclado-botao" onclick="clicou(0)">0</button>
      </div>
      <div class="botoes-comando">
        <button class="btn-comando btn-branco" onclick="branco()">Branco</button>
        <button class="btn-comando btn-corrige" onclick="corrige()">Corrige</button>
        <button class="btn-comando btn-confirma" onclick="confirma()">Confirma</button>
      </div>
    </div>
  </div>

  <div class="paineis-impressao">
    <button class="btn-impressao" onclick="gerarZeresima()">ZERÉSIMA</button>
    <button class="btn-impressao" onclick="gerarBoletim()">BOLETIM DE URNA</button>
  </div>

  <script href="script.js" src="script.js"></script>
</body>
</html>
